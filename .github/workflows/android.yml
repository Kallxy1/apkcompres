name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Mengaktifkan tombol manual "Run workflow" di GitHub Web

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Menggunakan Gradle Action resmi untuk memasang Gradle versi 8.0 yang cocok dengan Android Gradle Plugin 8.0.2
      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsappHQStatusCompressor-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
